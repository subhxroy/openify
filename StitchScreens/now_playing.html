<main class="relative flex flex-col items-center justify-center min-h-screen pt-16 pb-32 px-margin-mobile bg-mesh-glow">

<div class="w-2 h-2 bg-on-surface/20 rounded-full"></div>
</div>
</div>
</div>

<p class="font-body-md text-body-md text-on-surface-variant blur-[1px]">Echoes of a forgotten dream in the static</p>
<p class="font-body-md text-body-md text-on-surface-variant blur-[2px]">Tracing constellations with fingertips</p>
</div>

<script>
        // Simple micro-interaction for lyrics scroll feel
        document.addEventListener('mousemove', (e) => {
            const lyrics = document.querySelector('.blurred-lyrics-gradient');
            if (lyrics) {
                const moveX = (e.clientX - window.innerWidth / 2) / 50;
                const moveY = (e.clientY - window.innerHeight / 2) / 50;
                lyrics.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });

        // Toggle Play/Pause state for visual feedback
        const playBtn = document.querySelector('button[aria-label="Pause"]');
        let isPlaying = true;
        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            const icon = playBtn.querySelector('.material-symbols-outlined');
            icon.innerText = isPlaying ? 'pause' : 'play_arrow';
            
            const albumArt = document.querySelector('.album-art-spin');
            albumArt.style.animationPlayState = isPlaying ? 'running' : 'paused';
        });
    </script>
