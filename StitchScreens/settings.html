<style>
        body {
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            -webkit-tap-highlight-color: transparent;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        .toggle-checkbox:checked {

            border-color: theme('colors.primary-container');

        .toggle-checkbox:checked + .toggle-label {
            background-color: theme('colors.primary-container');
            box-shadow: 0 0 15px rgba(196, 242, 102, 0.3);
        }

<body class="antialiased min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface/80 backdrop-blur-xl bg-transparent flat no shadows flex items-center justify-between px-margin-mobile h-16">
<div class="flex items-center gap-sm">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-display-lg-mobile text-display-lg-mobile tracking-tighter text-primary-container">Openify</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 px-margin-mobile max-w-4xl mx-auto space-y-md">
<div class="mb-lg">
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Settings</h2>
<p class="font-body-md text-body-md text-on-surface" style="opacity: 0;">Manage your account and preferences.</p>
</div>
<!-- Settings Categories Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Account Setting Item -->
<button class="flex items-center justify-between p-md rounded-xl hover:bg-surface-container-high transition-colors text-left group bg-surface-container">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant group-hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-white">person</span>
</div>
<div>
<h3 class="font-title-sm text-title-sm text-on-surface text-white">Account</h3>
<p class="font-body-sm text-body-sm mt-1 text-on-surface">Profile, security, and subscription</p>
</div>
</div>
<span class="material-symbols-outlined text-white">chevron_right</span>
</button>
<!-- Playback Setting Item -->
<button class="flex items-center justify-between p-md rounded-xl hover:bg-surface-container-high transition-colors text-left group bg-surface-container">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant group-hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-white">play_circle</span>
</div>
<div>
<h3 class="font-title-sm text-title-sm text-on-surface text-white">Playback</h3>
<p class="font-body-sm text-body-sm mt-1 text-on-surface">Crossfade, gapless, autoplay</p>
</div>
</div>
<span class="material-symbols-outlined text-white">chevron_right</span>
</button>
<!-- Audio Quality Setting Item -->
<button class="flex items-center justify-between p-md rounded-xl hover:bg-surface-container-high transition-colors text-left group bg-surface-container">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant group-hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-white">graphic_eq</span>
</div>
<div>
<h3 class="font-title-sm text-title-sm text-on-surface text-white">Audio Quality</h3>
<p class="font-body-sm text-body-sm mt-1 text-on-surface">Streaming and download quality</p>
</div>
</div>
<span class="material-symbols-outlined text-white">chevron_right</span>
</button>
<!-- Notifications Setting Item -->
<button class="flex items-center justify-between p-md rounded-xl hover:bg-surface-container-high transition-colors text-left group bg-surface-container">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant group-hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-white">notifications</span>
</div>
<div>
<h3 class="font-title-sm text-title-sm text-on-surface text-white">Notifications</h3>

</div>
</div>
<span class="material-symbols-outlined text-white">chevron_right</span>
</button>

<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant group-hover:text-primary-container transition-colors">

</div>
<div>
<h3 class="font-title-sm text-title-sm text-on-surface text-white">Privacy</h3>
<p class="font-body-sm text-body-sm mt-1 text-on-surface">Data sharing and visibility</p>
</div>
</div>
<span class="material-symbols-outlined text-white">chevron_right</span>
</button>
</div>

<div class="mt-xl space-y-sm">
<h3 class="font-label-caps text-label-caps uppercase tracking-wider mb-md pl-xs text-white">Quick Toggles</h3>
<!-- Data Saver Toggle -->
<div class="flex items-center justify-between p-md bg-surface-container/30 backdrop-blur-md rounded-xl border border-white/5">

<h4 class="font-title-sm text-title-sm text-on-surface text-white">Data Saver</h4>
<p class="font-body-sm text-body-sm mt-1 text-on-surface">Sets audio quality to low and disables canvases</p>
</div>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 top-0 bottom-0 m-auto right-auto left-0" id="data_saver" name="toggle" type="checkbox">
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-container-highest cursor-pointer" for="data_saver"></label>
</div>
</div>
<!-- Offline Mode Toggle -->
<div class="flex items-center justify-between p-md bg-surface-container/30 backdrop-blur-md rounded-xl border border-white/5">
<div>
<h4 class="font-title-sm text-title-sm text-on-surface text-white">Offline Mode</h4>
<p class="font-body-sm text-body-sm mt-1 text-on-surface">Only play downloaded music and podcasts</p>

<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 top-0 bottom-0 m-auto right-auto left-0" id="offline_mode" name="toggle" type="checkbox">
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-container-highest cursor-pointer" for="offline_mode"></label>
