name: Openify CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Build & Verify Electron Client Application
  frontend-build:
    name: Electron Client Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: Bitsongs-Windows/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd Bitsongs-Windows
        npm ci

    - name: Verify Application Build
      run: |
        cd Bitsongs-Windows
        # Checks that package compile configurations are syntactically sound
        npm run build --if-present

  # Job 2: Lint and Verify Python Recommendation Server
  backend-verify:
    name: Python Server Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: Server/requirements.txt

    - name: Install Backend Dependencies
      run: |
        cd Server
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest

    - name: Lint Backend Code
      run: |
        cd Server
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Backend Tests
      run: |
        cd Server
        # Run pytest if any tests folder exists
        if [ -d "tests" ]; then
          pytest
        else
          echo "No tests folder configured. Skipping pytest run."
        fi
