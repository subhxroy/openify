<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Openify</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Split Dynamic Background -->
  <div class="app-background">
    <div class="indigo-bg">
      <canvas id="stars-canvas"></canvas>
      <div class="radial-glow" id="radial-glow"></div>
    </div>
    <div class="cream-bg"></div>
  </div>

  <!-- App Main Layout Container -->
  <div class="app-container">
    
    <!-- LEFT PANEL: Brand, Search, and Song List -->
    <div class="left-panel">
      <div class="brand-container">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-12.5c-2.48 0-4.5 2.02-4.5 4.5s2.02 4.5 4.5 4.5 4.5-2.02 4.5-4.5-2.02-4.5-4.5-4.5zm0 7.5c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm0-4.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5z"/>
          </svg>
        </div>
        <span class="brand-text">Openify</span>
      </div>

      <div class="search-container">
        <span class="search-icon">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
        <input type="text" id="search-input" placeholder="Search…" autocomplete="off" spellcheck="false">
        <button id="search-clear-btn" class="hidden">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
            <path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/>
          </svg>
        </button>
      </div>

      <!-- Nav Tabs -->
      <div class="nav-tabs">
        <button id="tab-home" class="nav-tab active">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
          </svg>
          <span>Home</span>
        </button>
        <button id="tab-playlists" class="nav-tab">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor">
            <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/>
          </svg>
          <span>Playlists</span>
        </button>
        <button id="tab-recommend" class="nav-tab">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/>
          </svg>
          <span>For You</span>
        </button>
      </div>

      <div class="list-header" id="list-header">TRENDING</div>

      <div class="song-list-wrapper">
        <div id="loading-indicator" class="loading-container hidden">
          <div class="spinner"></div>
          <span class="loading-text">Loading…</span>
        </div>

        <div id="error-container" class="error-container hidden">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="1" y1="1" x2="23" y2="23"></line>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"></path>
            <path d="M5 12.5a10.94 10.94 0 0 1 5.17-2.39"></path>
            <path d="M10.71 5.05A16 16 0 0 1 22.5 8"></path>
            <path d="M1.5 8a15.93 15.93 0 0 1 7.29-2.33"></path>
            <path d="M9 17a5 5 0 0 1 6 0"></path>
            <path d="M12 12.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"></path>
          </svg>
          <span class="error-title">Server offline</span>
          <span id="error-message" class="error-message"></span>
          <button id="retry-btn" class="btn-retry">Retry</button>
        </div>

        <!-- 1. Home / Search View -->
        <div id="songs-container" class="songs-container">
          <!-- Populated by JS -->
        </div>

        <!-- 2. Playlists List View -->
        <div id="playlists-container" class="playlists-container hidden">
          <div class="playlist-create-row">
            <input type="text" id="new-playlist-input" placeholder="New playlist name…" autocomplete="off">
            <button id="create-playlist-btn" class="btn-create-playlist" title="Create Playlist">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
              </svg>
            </button>
          </div>
          <div id="playlists-list" class="playlists-list-container">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- 3. Playlist Detail View -->
        <div id="playlist-detail-container" class="playlist-detail-container hidden">
          <div class="playlist-detail-header">
            <button id="playlist-back-btn" class="playlist-back-btn" title="Back to Playlists">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
              </svg>
            </button>
            <div class="playlist-info-meta">
              <input type="text" id="playlist-detail-name" class="playlist-detail-name" value="" title="Rename playlist" autocomplete="off">
              <div id="playlist-detail-desc" class="playlist-detail-desc">0 songs</div>
            </div>
            <button id="delete-playlist-btn" class="delete-playlist-btn" title="Delete Playlist">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
                <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
              </svg>
            </button>
          </div>
          <div id="playlist-songs-container" class="songs-container">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- 4. Recommendations View -->
        <div id="recommendations-container" class="recommendations-container hidden">
          <div id="recommendations-inner" class="recommendations-inner">
            <div class="rec-section-header">BEHAVIOR BASED</div>
            <div id="rec-behavior-container" class="rec-sub-container">
              <!-- Populated by JS -->
            </div>
            <div class="rec-section-header" style="margin-top: 15px;">CONTENT BASED</div>
            <div id="rec-content-container" class="rec-sub-container">
              <!-- Populated by JS -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- CENTER PANEL: Vinyl Turntable and Floating Controls -->
    <div class="center-panel">
      <div class="turntable-container">
        <!-- Visualizer Canvas -->
        <canvas id="visualizer-canvas" class="visualizer-canvas"></canvas>
        <!-- Rotating Vinyl Disc -->
        <div class="vinyl-disc-container" id="vinyl-disc-container">
          <div class="vinyl-disc" id="vinyl-disc">
            <!-- Grooves -->
            <div class="vinyl-grooves" id="vinyl-grooves"></div>
            <!-- Center Label -->
            <div class="vinyl-center-label" id="vinyl-center-label">
              <div class="vinyl-center-image" id="vinyl-center-image"></div>
              <div class="vinyl-center-pin-border"></div>
              <div class="vinyl-center-pin"></div>
            </div>
          </div>
        </div>

        <!-- Needle Arm -->
        <div class="needle-arm-container" id="needle-arm-container">
          <div class="needle-arm" id="needle-arm">
            <!-- Arm shaft -->
            <div class="needle-shaft"></div>
            <!-- Cartridge headshell -->
            <div class="needle-head"></div>
            <!-- Pivot ring -->
            <div class="needle-pivot"></div>
          </div>
        </div>
      </div>

      <!-- Floating Controls Capsule -->
      <div class="player-controls-bar">
        <!-- Playback buttons -->
        <div class="control-buttons">
          <button id="prev-btn" class="control-btn" title="Previous">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6L18 18V6z"/>
            </svg>
          </button>
          
          <button id="play-pause-btn" class="play-pause-btn" title="Play/Pause">
            <div class="play-pause-circle">
              <!-- Play Icon -->
              <svg id="play-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
              <!-- Pause Icon -->
              <svg id="pause-icon" class="hidden" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
              </svg>
            </div>
          </button>

          <button id="next-btn" class="control-btn" title="Next">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
            </svg>
          </button>
        </div>

        <!-- SeekBar Progress -->
        <div class="seek-container">
          <div class="seek-bar-wrapper" id="seek-bar-wrapper">
            <div class="seek-bar-track"></div>
            <div class="seek-bar-fill" id="seek-bar-fill"></div>
            <div class="seek-bar-handle" id="seek-bar-handle"></div>
          </div>
          <div class="time-display">
            <span id="current-time">0:00</span>
            <span id="buffering-status" class="buffering-text hidden">Buffering…</span>
            <span id="duration-time">0:00</span>
          </div>
        </div>

        <!-- Volume slider -->
        <div class="volume-container">
          <button id="volume-toggle-btn" class="volume-icon-btn">
            <svg id="volume-high-icon" viewBox="0 0 24 24" width="11" height="11" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
            <svg id="volume-mute-icon" class="hidden" viewBox="0 0 24 24" width="11" height="11" fill="currentColor">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
          </button>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.75" class="volume-slider">
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL: Cover Art and Info -->
    <div class="right-panel">
      <div class="metadata-wrapper">
        <div class="album-art-container" id="album-art-container">
          <div class="album-art-fallback" id="album-art-fallback">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
            </svg>
          </div>
          <img id="large-album-art" src="" alt="Album Art" class="hidden">
        </div>

        <div class="song-info-container">
          <h1 id="song-title" class="song-title">Nothing playing</h1>
          <h2 id="song-artist" class="song-artist"></h2>
        </div>
      </div>
    </div>

  </div>

  <!-- Add to Playlist Overlay Menu -->
  <div id="add-to-playlist-overlay" class="add-to-playlist-overlay hidden">
    <div class="overlay-header">Add to Playlist</div>
    <div id="overlay-playlists-list" class="overlay-playlists-list">
      <!-- Playlists populated by JS -->
    </div>
    <button id="close-overlay-btn" class="btn-close-overlay">Cancel</button>
  </div>

  <script src="playlistStore.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
